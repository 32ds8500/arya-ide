services:
  - type: web
    name: arya-ide
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && npx drizzle-kit push && npm run build
    startCommand: npm start
    branch: master
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        value: ./data/arya.db
      - key: REDIS_URL
        fromDatabase:
          name: arya-redis
          property: connectionString
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: arya-redis
    plan: free
    ipAllowList: []
